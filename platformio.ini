[env:esp32]
platform = espressif32
framework = arduino
board = esp32dev
lib_deps = 
	majicdesigns/MD_Parola@^3.7.5
	adafruit/Adafruit BMP085 Library@^1.2.4
	adafruit/Adafruit Unified Sensor@^1.1.15
